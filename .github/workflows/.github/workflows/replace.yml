name: Replace FluxNet

on:
  push:
    branches: [ main ]
    paths: [ 'sub.txt' ]

jobs:
  replace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: –Ч–∞–Љ–µ–љ–∞ FluxNet вЖТ xNiksizNetвЭДпЄП
        run: |
          sed -i 's/FluxNet/xNiksizNetвЭДпЄП/g' sub.txt
          sed -i 's/Flux /xNiksiz /g' sub.txt
          sed -i 's/Flux$/xNiksiz/g' sub.txt
          sed -i 's/FN/XN/g' sub.txt
          sed -i 's/| Flux /| xNiksiz /g' sub.txt
      
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: рЯ§Ц Auto-replace FluxNet to xNiksizNetвЭДпЄП
          file_pattern: sub.txt
        
